name: nutrisense
description: "NutriSense - Understand Your Food. Improve Your Health."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Charts
  fl_chart: ^0.68.0

  # Networking
  http: ^1.2.1

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1

  # Camera & Images
  # NOTE: image_picker (below) is what's actually used for scanning —
  # it handles both gallery selection and camera capture, and works on
  # web (unlike the `camera` package, which also requires a much newer
  # Android minSdk than this project targets and isn't referenced
  # anywhere in this codebase). Same story for `health` and
  # `permission_handler` — removed: not imported anywhere, and `health`
  # specifically forces minSdkVersion 26 via its Android manifest,
  # which broke `flutter build apk --release` for no actual feature.
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.2.3

  # UI utilities
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: true
  ios: false
  web: true
  windows: false
  macos: false
  linux: false
  # Use the square icon-only mark, not the full wordmark+tagline logo —
  # launcher icons get cropped to a circle/squircle by the OS and have no
  # room for text at the sizes they're rendered at (as low as 36x36).
  image_path: "assets/images/logo_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
       # - asset: assets/fonts/Inter-Regular.ttf
       # - asset: assets/fonts/Inter-Medium.ttf
       #   weight: 500
       # - asset: assets/fonts/Inter-SemiBold.ttf
       #   weight: 600
        # - asset: assets/fonts/Inter-Bold.ttf
        #  weight: 700
