name: nutrisense
description: "NutriSense - Understand Your Food. Improve Your Health."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Charts
  fl_chart: ^0.68.0

  # Networking
  http: ^1.2.1

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1

  # Camera & Images
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  # Local storage
  shared_preferences: ^2.2.3

  # Health data
  health: ^11.0.0

  # UI utilities
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Inter
      fonts:
       # - asset: assets/fonts/Inter-Regular.ttf
       # - asset: assets/fonts/Inter-Medium.ttf
       #   weight: 500
       # - asset: assets/fonts/Inter-SemiBold.ttf
       #   weight: 600
        # - asset: assets/fonts/Inter-Bold.ttf
        #  weight: 700
